name: CD - standalone .exe

# CHR-009: builds the standalone Windows .exe (PyInstaller). Mirrors exactly the steps verified
# locally with scripts/build-exe.ps1 (frontend build -> pip install -> pyinstaller).
#
# Version tags publish walker.exe to the GitHub Release. Pushes to develop only build it and keep
# it as a workflow artifact (retained by GitHub Actions, downloadable from the run) so the .exe can
# be smoke-tested ahead of a release, without creating one.
on:
  push:
    tags:
      - "v*"
    branches:
      - develop

jobs:
  build-exe:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Install walker + PyInstaller
        run: pip install -e ".[build-exe]"

      - name: Build the .exe
        run: pyinstaller walker.spec --noconfirm

      - name: Upload walker.exe as a workflow artifact (develop)
        if: startsWith(github.ref, 'refs/heads/')
        uses: actions/upload-artifact@v4
        with:
          name: walker-exe
          path: dist/walker.exe

      - name: Attach walker.exe to the GitHub Release (version tags)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: dist/walker.exe
          body_path: RELEASE_NOTES.md
