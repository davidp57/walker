site_name: Walker
site_description: A personal time tracker that prepares your timesheet for re-entry into your company's timesheet system.
site_url: https://davidp57.github.io/walker/
repo_url: https://github.com/davidp57/Walker
repo_name: davidp57/Walker
docs_dir: docs-site

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - pymdownx.superfences

plugins:
  - search
  # Bilingual site (CHR-010): English is the default (served at the root, and the fallback for any
  # not-yet-translated page); French pages live beside their English source with a `.fr.md` suffix.
  # mkdocs-material renders a language switcher in the header from the alternates this plugin injects.
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: fr
          name: Français
          build: true
          nav_translations:
            Home: Accueil
            Getting Started: Prise en main
            Self-hosting: Auto-hébergement
            Standalone .exe: Exécutable autonome (.exe)
            Configuring SSO: Configurer le SSO
            Day-to-day Guide: Guide au quotidien
            Importing codes: Importer les codes

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Self-hosting:
      - Docker: self-hosting/docker.md
      - Portainer: self-hosting/portainer.md
      - Standalone .exe: self-hosting/standalone-exe.md
      - Configuring SSO: self-hosting/sso.md
  - Day-to-day Guide: guide.md
  - Importing codes: catalog-import.md
