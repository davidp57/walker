site_name: Walker
site_description: A personal time tracker that prepares your timesheet for re-entry into your company's timesheet system.
site_url: https://davidp57.github.io/Walker/
repo_url: https://github.com/davidp57/Walker
repo_name: davidp57/Walker
docs_dir: docs-site

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

markdown_extensions:
  - toc:
      permalink: true
  - admonition
  - pymdownx.superfences

plugins:
  - search

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Self-hosting:
      - Docker: self-hosting/docker.md
      - Portainer: self-hosting/portainer.md
      - Standalone .exe: self-hosting/standalone-exe.md
  - Day-to-day Guide: guide.md
